<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3C3489" />

  <!-- PWA iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StampIT" />
  <link rel="apple-touch-icon" href="/icon-192.png" />


  <!-- Verhindert Zoomen auf Scanner-Seite -->
  <meta name="mobile-web-app-capable" content="yes" />

  <title>StampIT</title><script>
  (function () {
    var isScanner = location.pathname.startsWith('/scanner');
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = isScanner ? '/manifest-scanner.json' : '/manifest.json';
    document.head.appendChild(link);
  })();
</script>

</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>

</html>
